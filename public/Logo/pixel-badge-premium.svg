<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>

    <!-- ── Clip & Mask ────────────────────────────────────────── -->
    <clipPath id="badgeClip">
      <rect x="80" y="80" width="240" height="240" rx="48"/>
    </clipPath>

    <!-- Punches the P shape OUT of every badge layer so the backlight shows through -->
    <mask id="pCutout">
      <rect width="400" height="400" fill="white"/>
      <text x="200" y="236"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="148" font-weight="800"
        text-anchor="middle"
        fill="black">P</text>
    </mask>

    <!-- ── Filters ────────────────────────────────────────────── -->

    <!-- Soft ground glow -->
    <filter id="gndBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>

    <!-- Badge drop-shadow (depth in chassis) -->
    <filter id="badgeDrop" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="20"
        flood-color="#1c0700" flood-opacity="0.85"/>
    </filter>

    <!-- Cool-white backlight glow — three-pass for depth -->
    <filter id="backlitGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="wide"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"  result="tight"/>
      <feMerge>
        <feMergeNode in="wide"/>
        <feMergeNode in="wide"/>
        <feMergeNode in="tight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft inner edge for channel rim highlights -->
    <filter id="rimGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>

    <!-- Brushed-metal noise (horizontal directionality) -->
    <filter id="brushNoise" x="0%" y="0%" width="100%" height="100%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise"
        baseFrequency="0.0 0.65"
        numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="soft-light" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- ── Gradients ──────────────────────────────────────────── -->

    <!-- Badge base: orange, slightly lighter at top-center (ambient catch) -->
    <radialGradient id="badgeBase" cx="40%" cy="28%" r="72%">
      <stop offset="0%"   stop-color="#ff7d3a"/>
      <stop offset="35%"  stop-color="#f05518"/>
      <stop offset="75%"  stop-color="#de4200"/>
      <stop offset="100%" stop-color="#b83000"/>
    </radialGradient>

    <!-- Bevel: bright top-left → dark bottom-right (studio light from top-left) -->
    <linearGradient id="bevelLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,220,170,0.52)"/>
      <stop offset="12%"  stop-color="rgba(255,200,140,0.14)"/>
      <stop offset="80%"  stop-color="rgba(0,0,0,0.04)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.32)"/>
    </linearGradient>

    <!-- Specular hotspot on top-left corner -->
    <radialGradient id="specular" cx="18%" cy="16%" r="38%">
      <stop offset="0%"   stop-color="rgba(255,235,200,0.42)"/>
      <stop offset="100%" stop-color="rgba(255,200,140,0.00)"/>
    </radialGradient>

    <!-- Top-edge polished catch (very bright thin strip) -->
    <linearGradient id="topEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,225,180,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,190,120,0.00)"/>
    </linearGradient>

    <!-- Left-edge polished catch -->
    <linearGradient id="leftEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="rgba(255,210,160,0.65)"/>
      <stop offset="100%" stop-color="rgba(255,190,120,0.00)"/>
    </linearGradient>

    <!-- Bottom-edge shadow (opposite light source) -->
    <linearGradient id="bottomEdge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.55)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.00)"/>
    </linearGradient>

    <!-- Right-edge shadow -->
    <linearGradient id="rightEdge" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.40)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.00)"/>
    </linearGradient>

    <!-- Warm ground glow -->
    <radialGradient id="groundGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff5800" stop-opacity="0.55"/>
      <stop offset="45%"  stop-color="#ff3d00" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#ff6000" stop-opacity="0.00"/>
    </radialGradient>

    <!-- Horizontal brushed-stripe pattern (subtle, repeating) -->
    <pattern id="hStripes" x="0" y="0" width="240" height="3"
             patternUnits="userSpaceOnUse">
      <rect width="240" height="1.5" fill="rgba(255,255,255,0.028)"/>
      <rect y="1.5" width="240" height="1.5" fill="rgba(0,0,0,0.022)"/>
    </pattern>

  </defs>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 1. DARK DEVICE CHASSIS                                       -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect width="400" height="400" fill="#0a0a0a"/>
  <!-- Very faint surface grain on chassis -->
  <rect width="400" height="400" fill="rgba(255,255,255,0.008)"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 2. WARM ORANGE GROUND GLOW (beneath badge)                  -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <ellipse cx="200" cy="322" rx="148" ry="42"
    fill="url(#groundGlow)" filter="url(#gndBlur)"/>
  <!-- tighter concentrated glow ring -->
  <ellipse cx="200" cy="330" rx="105" ry="22"
    fill="#ff4800" opacity="0.07"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 3. BADGE DEPTH / DROP SHADOW                                 -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <rect x="80" y="80" width="240" height="240" rx="48"
    fill="#200800" filter="url(#badgeDrop)" opacity="0.65"/>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 4. BADGE SURFACE LAYERS (all masked: P cut out)              -->
  <!-- ═══════════════════════════════════════════════════════════ -->
  <g mask="url(#pCutout)">

    <!-- 4a. Base orange (matte, slightly warmer at center-top) -->
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#badgeBase)"/>

    <!-- 4b. Horizontal brushed-metal stripe texture -->
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#hStripes)" clip-path="url(#badgeClip)"/>

    <!-- 4c. Algorithmic brushed-noise overlay -->
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#badgeBase)"
      filter="url(#brushNoise)" opacity="0.18"
      clip-path="url(#badgeClip)"/>

    <!-- 4d. Bevel lighting (studio light from top-left) -->
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#bevelLight)"/>

    <!-- 4e. Specular hotspot (top-left corner catch) -->
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#specular)"/>

    <!-- 4f. Bottom-right shadow (opposite the light) -->
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#bottomEdge)" opacity="0.7"/>
    <rect x="80" y="80" width="240" height="240" rx="48"
      fill="url(#rightEdge)"  opacity="0.5"/>

  </g>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 5. P CHANNEL BACKLIGHT (visible through the cutout hole)     -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- 5a. Wide aura — warm-cool halo that bleeds from channel -->
  <text x="200" y="236"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="148" font-weight="800"
    text-anchor="middle"
    fill="rgba(190,220,255,0.55)"
    filter="url(#backlitGlow)">P</text>

  <!-- 5b. Core cool-white backlight (medical-precise) -->
  <text x="200" y="236"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="148" font-weight="800"
    text-anchor="middle"
    fill="rgba(225,240,255,0.82)"
    filter="url(#backlitGlow)">P</text>

  <!-- 5c. Channel floor — dark recess (bottom of the engraved channel) -->
  <text x="201" y="237"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="148" font-weight="800"
    text-anchor="middle"
    fill="rgba(60,18,0,0.72)">P</text>

  <!-- 5d. Channel rim highlight — thin bright edge (top-left catch) -->
  <text x="199" y="235"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="148" font-weight="800"
    text-anchor="middle"
    fill="rgba(255,230,195,0.28)"
    filter="url(#rimGlow)">P</text>

  <!-- ═══════════════════════════════════════════════════════════ -->
  <!-- 6. POLISHED BEVELED EDGES (not masked — physical edge)       -->
  <!-- ═══════════════════════════════════════════════════════════ -->

  <!-- Top polished edge (bright, 4px, fades out) -->
  <rect x="92" y="80" width="216" height="6" rx="3"
    fill="url(#topEdge)" opacity="0.88"/>

  <!-- Left polished edge -->
  <rect x="80" y="92" width="6" height="216" rx="3"
    fill="url(#leftEdge)" opacity="0.60"/>

  <!-- Bottom shadow edge -->
  <rect x="92" y="314" width="216" height="6" rx="3"
    fill="url(#bottomEdge)" opacity="0.65"/>

  <!-- Right shadow edge -->
  <rect x="314" y="92" width="6" height="216" rx="3"
    fill="url(#rightEdge)" opacity="0.50"/>

  <!-- Outer chamfer ring — subtle border defining the badge face -->
  <rect x="81" y="81" width="238" height="238" rx="47"
    fill="none"
    stroke="rgba(255,165,90,0.40)" stroke-width="1"/>

  <!-- Inner chamfer ring — the inner rim of the bevel -->
  <rect x="87" y="87" width="226" height="226" rx="43"
    fill="none"
    stroke="rgba(255,145,70,0.18)" stroke-width="0.75"/>

</svg>
