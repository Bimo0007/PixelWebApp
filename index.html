<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel</title>
    <link rel="icon" type="image/png" href="/Logo/C-Logo.png" />
    <script>
      // Apply stored language before React mounts to prevent flash of wrong font
      (function () {
        var lang = localStorage.getItem('pixel-lang');
        if (lang) {
          document.documentElement.lang = lang;
          document.documentElement.setAttribute('data-lang', lang);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
